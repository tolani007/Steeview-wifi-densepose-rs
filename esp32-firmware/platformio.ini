; Steeview ESP32 CSI Firmware — PlatformIO project config
; Board: ESP32-DevKitC (or any ESP32 with WROVER module for CSI support)
;
; Two firmware targets:
;   tx  — Transmits WiFi beacon/NDPA frames (place near subject)
;   rx  — Receives frames, extracts CSI, forwards UDP to Mac (place across room)

[env]
platform   = espressif32@^6.5.0
framework  = arduino
monitor_speed = 115200
upload_speed  = 921600
build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DCONFIG_ESP32_WIFI_CSI_ENABLED=1

; ── TX (Transmitter) ─────────────────────────────────────────────────────────
[env:tx]
board = esp32dev
build_flags =
    ${env.build_flags}
    -DSTEEVIEW_TX=1
    -DWIFI_SSID=\"SteeviewCSI\"
    -DWIFI_PASS=\"steeview2026\"
build_src_filter = +<tx/>

; ── RX (Receiver / CSI extractor) ────────────────────────────────────────────
[env:rx]
board = esp32dev
build_flags =
    ${env.build_flags}
    -DSTEEVIEW_RX=1
    -DWIFI_SSID=\"SteeviewCSI\"
    -DWIFI_PASS=\"steeview2026\"
    ; ⚠️  Change this to your Mac's local IP (run: ipconfig getifaddr en0)
    -DMAC_IP=\"10.0.1.2\"
    -DUDP_PORT=5500
    -DN_SUBCARRIERS=56
build_src_filter = +<rx/>
